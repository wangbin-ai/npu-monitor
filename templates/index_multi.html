<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NPU 资源监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#121828;
  --card:rgba(255,255,255,.04);--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.18);
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--orange:#f59e0b;
  --purple:#8b5cf6;--pink:#ec4899;--red:#ef4444;--lime:#84cc16;
  --text:#e2e8f0;--text2:#64748b;--text3:#94a3b8;
  --r:14px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px}

/* header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 28px;background:rgba(13,18,32,.92);
  border-bottom:1px solid var(--border);backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:20;
}
.hlogo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;margin-right:10px;
}
header h1{font-size:18px;font-weight:700}
header h1 em{
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;
}
.hright{display:flex;align-items:center;gap:14px}
.upd{font-size:12px;color:var(--text2)}
.upd b{color:var(--green)}
.rbtn{
  padding:7px 17px;border-radius:var(--r-sm);border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;font-size:13px;font-weight:500;transition:opacity .2s;
}
.rbtn:hover{opacity:.82}

/* ── Row 1: stat cards ── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;padding:20px 28px 0;
}
.sc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px 16px;position:relative;overflow:hidden;
  transition:border-color .22s,box-shadow .22s;cursor:default;
}
.sc.blue:hover  {border-color:var(--blue);  box-shadow:0 0 0 1px var(--blue),  0 0 28px color-mix(in srgb,var(--blue)   30%,transparent)}
.sc.green:hover {border-color:var(--green); box-shadow:0 0 0 1px var(--green), 0 0 28px color-mix(in srgb,var(--green)  30%,transparent)}
.sc.orange:hover{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 0 28px color-mix(in srgb,var(--orange) 30%,transparent)}
.sc.red:hover   {border-color:var(--purple);box-shadow:0 0 0 1px var(--purple),0 0 28px color-mix(in srgb,var(--purple) 30%,transparent)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.sc-label{font-size:11px;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.sc-icon{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.sc-num{font-size:40px;font-weight:800;line-height:1;letter-spacing:-1px;margin-bottom:10px}
.sc.blue .sc-num{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc.green .sc-num{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc.orange .sc-num{background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc.red .sc-num{background:linear-gradient(135deg,var(--red),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc.blue  .sc-icon{background:rgba(59,130,246,.15);color:var(--blue)}
.sc.green .sc-icon{background:rgba(16,185,129,.15);color:var(--green)}
.sc.orange.sc-icon{background:rgba(245,158,11,.15);color:var(--orange)}
.sc.orange .sc-icon{background:rgba(245,158,11,.15);color:var(--orange)}
.sc.red   .sc-icon{background:rgba(139,92,246,.15);color:var(--purple)}
.prog{height:3px;border-radius:2px;background:rgba(255,255,255,.06);margin-bottom:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .6s ease}
.sc.blue   .prog-fill{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.sc.green  .prog-fill{background:linear-gradient(90deg,var(--green),var(--cyan))}
.sc.orange .prog-fill{background:linear-gradient(90deg,var(--orange),var(--pink))}
.sc.red    .prog-fill{background:linear-gradient(90deg,var(--red),var(--purple))}
.sc-sub{font-size:12px;color:var(--text2)}

/* ── Row 2: charts ── */
.charts-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:14px;padding:14px 28px 0;
}
.cbox{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 20px 16px;
  display:flex;flex-direction:column;
  transition:border-color .22s,box-shadow .22s;
}
.cbox:hover{border-color:rgba(99,102,241,.45);box-shadow:0 0 0 1px rgba(99,102,241,.2),0 0 28px rgba(99,102,241,.1)}
.cbox-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-shrink:0;
}
.cbox-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
.cbox-title .icon{font-size:16px}
.cbox .echart{flex:1;min-height:280px;width:100%}

/* ── quota list ── */
#quota-list{overflow-y:auto;max-height:340px;padding:0 2px}
#quota-list::-webkit-scrollbar{width:4px}
#quota-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.ql-item{
  padding:9px 6px 10px;border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .18s;border-radius:8px;
}
.ql-item:last-child{border-bottom:none}
.ql-item:hover{background:rgba(255,255,255,.03)}
.ql-item.is-over{background:rgba(239,68,68,.04)}
.ql-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.ql-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.ql-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ql-used{font-size:13px;font-weight:700}
.ql-sep{color:var(--text2);font-size:12px}
.ql-quota-num{font-size:12px;color:var(--text2)}
.ql-over-badge{
  font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;
  background:rgba(239,68,68,.18);color:#f87171;letter-spacing:.4px;
}
.over-badge-hdr{
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:rgba(239,68,68,.18);color:#f87171;
}
.ql-track{
  height:5px;border-radius:3px;background:rgba(255,255,255,.06);
  position:relative;overflow:visible;
}
.ql-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ql-marker{
  position:absolute;top:-3px;bottom:-3px;width:2px;border-radius:1px;
  background:rgba(255,255,255,.3);pointer-events:none;
}
.ql-footer{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--text2);margin-top:4px;
}

/* ── Row 3: detail section ── */
.detail-wrap{padding:14px 28px 28px}
.detail-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.detail-hdr-left{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
.detail-hdr-left .dicon{
  width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.detail-hint{font-size:12px;color:var(--text2)}

/* leader blocks */
#detail-list{display:flex;flex-direction:column;gap:10px}
.lb{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);
  transition:border-color .22s,box-shadow .22s;
}
.lb:hover{border-color:var(--lc,var(--blue));box-shadow:0 0 0 1px var(--lc,var(--blue)),0 0 24px color-mix(in srgb,var(--lc,var(--blue)) 30%,transparent)}
.lb-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;cursor:pointer;
  background:var(--card);
  border-left:3px solid var(--lc,var(--blue));
}
.lb-row:hover{background:rgba(255,255,255,.06)}
.chev{font-size:11px;color:var(--text2);transition:transform .22s;flex-shrink:0}
.lb.open .lb-row .chev{transform:rotate(90deg)}
.lavatar{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--lc,var(--blue)),color-mix(in srgb,var(--lc,var(--blue)) 60%,#fff));
}
.linfo{flex:1;min-width:0}
.lname{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmeta{font-size:12px;color:var(--text2);margin-top:2px}
.lstats{display:flex;gap:24px;flex-shrink:0}
.lstat{text-align:center}
.lstat-lbl{font-size:11px;color:var(--text2);margin-bottom:3px;white-space:nowrap}
.lstat-val{font-size:16px;font-weight:700}
.npu-val{color:var(--blue)}
.task-val{color:var(--green)}
.dur-val{color:var(--purple)}
.leader-badge{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  background:rgba(245,158,11,.15);color:var(--orange);flex-shrink:0;
}

/* type sections inside leader */
.lb-body{display:none;padding:0 16px 12px;background:rgba(0,0,0,.2)}
.lb.open .lb-body{display:block}
.type-sec{margin-top:10px}
.type-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.4px;
  margin-bottom:8px;
}
.pill-dev  {background:rgba(59,130,246,.12);color:var(--blue)}
.pill-train{background:rgba(16,185,129,.12);color:var(--green)}
.pill-infer{background:rgba(245,158,11,.12);color:var(--orange)}

/* member rows */
.mb{
  border-radius:var(--r-sm);margin-bottom:6px;
  border:1px solid rgba(255,255,255,.05);overflow:hidden;
  transition:border-color .18s;
}
.mb:hover{border-color:rgba(255,255,255,.12)}
.mb-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;cursor:pointer;
  background:rgba(255,255,255,.025);
}
.mb.open .mb-row .chev{transform:rotate(90deg)}
.mavatar{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.mname{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mstats{display:flex;gap:16px;flex-shrink:0}
.mstat{text-align:right}
.mstat-lbl{font-size:10px;color:var(--text2)}
.mstat-val{font-size:13px;font-weight:700}

/* task rows */
.task-list{display:none;padding:4px 12px 8px;background:rgba(0,0,0,.15)}
.mb.open .task-list{display:block}
.tr{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px;border-radius:6px;font-size:12px;
  color:var(--text3);transition:background .15s;
}
.tr:hover{background:rgba(255,255,255,.04)}
.tr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--text2)}
.tr-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-npu{color:var(--blue);font-weight:600;flex-shrink:0}
.tr-dur{color:var(--text2);flex-shrink:0;min-width:30px;text-align:right}
.tr-spec{color:var(--text2);flex-shrink:0;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* loading */
#loading{
  position:fixed;inset:0;z-index:99;background:rgba(8,12,20,.8);
  backdrop-filter:blur(6px);display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.spin{
  width:34px;height:34px;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);border-top-color:var(--blue);
  animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--text3)}
.empty-tip{padding:20px;text-align:center;color:var(--text2);font-size:13px}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><p>加载中…</p></div>

<header>
  <div style="display:flex;align-items:center">
    <div class="hlogo">N</div>
    <h1>NPU <em>资源监控</em></h1>
  </div>
  <div class="hright">
    <span class="upd">更新于 <b id="upd-time">—</b></span>
    <button class="rbtn" onclick="loadData(true)">↻ 刷新</button>
  </div>
</header>

<!-- Row 1 -->
<div class="stats-row">
  <div class="sc blue">
    <div class="sc-top">
      <span class="sc-label">开发环境 NPU</span>
      <div class="sc-icon">💻</div>
    </div>
    <div class="sc-num" id="s-devenv">—</div>
    <div class="prog"><div class="prog-fill" id="p-devenv" style="width:0%"></div></div>
    <div class="sc-sub" id="sub-devenv">— 个实例</div>
  </div>
  <div class="sc green">
    <div class="sc-top">
      <span class="sc-label">训练作业 NPU</span>
      <div class="sc-icon">🚀</div>
    </div>
    <div class="sc-num" id="s-train">—</div>
    <div class="prog"><div class="prog-fill" id="p-train" style="width:0%"></div></div>
    <div class="sc-sub" id="sub-train">— 个任务</div>
  </div>
  <div class="sc orange">
    <div class="sc-top">
      <span class="sc-label">推理服务 NPU</span>
      <div class="sc-icon">⚡</div>
    </div>
    <div class="sc-num" id="s-inference">—</div>
    <div class="prog"><div class="prog-fill" id="p-inference" style="width:0%"></div></div>
    <div class="sc-sub" id="sub-inference">— 个服务</div>
  </div>
  <div class="sc red">
    <div class="sc-top">
      <span class="sc-label">NPU 合计</span>
      <div class="sc-icon">📊</div>
    </div>
    <div class="sc-num" id="s-total">—</div>
    <div class="prog"><div class="prog-fill" id="p-total" style="width:100%"></div></div>
    <div class="sc-sub">全部资源占用</div>
  </div>
</div>

<!-- Row 2 -->
<div class="charts-row">
  <div class="cbox">
    <div class="cbox-hdr">
      <div class="cbox-title"><span class="icon">◈</span>各小组 NPU 占用 / 配额</div>
      <span id="quota-over-count" style="display:none" class="over-badge-hdr"></span>
    </div>
    <div id="quota-list"></div>
  </div>
  <div class="cbox">
    <div class="cbox-hdr">
      <div class="cbox-title"><span class="icon">▦</span>各小组 NPU 占用（开发 / 训练 / 推理）</div>
    </div>
    <div class="echart" id="chart-spec"></div>
  </div>
</div>

<!-- Row 3 -->
<div class="detail-wrap">
  <div class="detail-hdr">
    <div class="detail-hdr-left">
      <div class="dicon">≡</div>
      任务详情
    </div>
    <span class="detail-hint">点击展开查看任务</span>
  </div>
  <div id="detail-list"></div>
</div>

<script>
const PAL = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#ef4444','#84cc16','#f97316','#a78bfa'];
let _charts = {};

/* ── quota list ── */
function renderQuotaList(leaderMap, quotas) {
  const el = document.getElementById('quota-list');
  if (!leaderMap.length) { el.innerHTML = '<div class="empty-tip">暂无数据</div>'; return; }

  const hasQuota = Object.keys(quotas).length > 0;
  // 缩放基准：已用和配额中的最大值
  const maxVal = Math.max(1,
    ...leaderMap.map(([,ld]) => ld.gpu_num),
    ...(hasQuota ? leaderMap.map(([l]) => quotas[l] || 0) : [0])
  );

  let overCount = 0;
  const rows = leaderMap.map(([leader, ld], i) => {
    const used   = ld.gpu_num;
    const quota  = quotas[leader] || 0;
    const isOver = quota > 0 && used > quota;
    const overAmt = isOver ? used - quota : 0;
    if (isOver) overCount++;

    // 进度条宽度百分比（相对于 maxVal）
    const usedPct  = (used  / maxVal * 100).toFixed(1);
    const quotaPct = quota > 0 ? (quota / maxVal * 100).toFixed(1) : null;

    // 颜色：超额→红，接近配额（>80%）→橙，正常→调色板
    let fillColor, usedColor;
    if (isOver) {
      fillColor = 'linear-gradient(90deg,rgba(239,68,68,.5),rgba(239,68,68,.85))';
      usedColor = '#f87171';
    } else if (quota > 0 && used / quota > 0.8) {
      fillColor = 'linear-gradient(90deg,rgba(245,158,11,.4),rgba(245,158,11,.8))';
      usedColor = '#fbbf24';
    } else {
      const c = PAL[i % PAL.length];
      fillColor = `linear-gradient(90deg,${c}55,${c}cc)`;
      usedColor = c;
    }

    const shortName = leader.length > 14 ? leader.slice(0,14)+'…' : leader;
    const pctLabel  = quota > 0 ? `${Math.round(used/quota*100)}%` : '';

    return `
    <div class="ql-item${isOver ? ' is-over' : ''}">
      <div class="ql-head">
        <span class="ql-name" title="${leader}">${shortName}</span>
        <div class="ql-right">
          <span class="ql-used" style="color:${usedColor}">${used}</span>
          ${quota > 0 ? `<span class="ql-sep">/</span><span class="ql-quota-num">${quota}</span>` : ''}
          ${isOver ? `<span class="ql-over-badge">+${overAmt} 超额</span>` : ''}
        </div>
      </div>
      <div class="ql-track">
        <div class="ql-fill" style="width:${usedPct}%;background:${fillColor}"></div>
        ${quotaPct !== null ? `<div class="ql-marker" style="left:${quotaPct}%"></div>` : ''}
      </div>
      ${quota > 0 ? `<div class="ql-footer"><span></span><span>${pctLabel} 使用率</span></div>` : ''}
    </div>`;
  });

  el.innerHTML = rows.join('');

  // 顶部超额统计徽章
  const badge = document.getElementById('quota-over-count');
  if (overCount > 0) {
    badge.textContent = `${overCount} 组超额`;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

function initTeamChart(leaderMap) {
  const el = document.getElementById('chart-spec');
  if (_charts.spec) _charts.spec.dispose();
  const c = echarts.init(el);
  _charts.spec = c;

  // 取前12个小组，倒序排列让最大值在顶部
  const top = leaderMap.slice(0, 12).reverse();
  const names  = top.map(([l]) => l.length > 8 ? l.slice(0,8)+'…' : l);
  const fullNames = top.map(([l]) => l);
  const devData   = top.map(([,ld]) => (ld.types.devenv   || {gpu_num:0}).gpu_num);
  const trainData = top.map(([,ld]) => (ld.types.train    || {gpu_num:0}).gpu_num);
  const inferData = top.map(([,ld]) => (ld.types.inference|| {gpu_num:0}).gpu_num);

  c.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      backgroundColor: '#1a2035', borderColor: 'rgba(255,255,255,.1)',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter(params) {
        const i = params[0].dataIndex;
        const rows = params.filter(p=>p.value>0)
          .map(p=>`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px"></span>${p.seriesName}: <b>${p.value}</b>`).join('<br>');
        const total = devData[i]+trainData[i]+inferData[i];
        return `<div style="font-weight:700;margin-bottom:6px">${fullNames[i]}</div>${rows}<hr style="border-color:rgba(255,255,255,.1);margin:6px 0"><span style="color:#94a3b8">合计:</span> <b style="color:#fff">${total} NPU</b>`;
      },
    },
    legend: {
      top: 0, right: 0,
      textStyle: { color: '#94a3b8', fontSize: 12 }, itemWidth: 10, itemHeight: 10,
    },
    grid: { left: 8, right: 16, top: 28, bottom: 4, containLabel: true },
    xAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
    },
    yAxis: {
      type: 'category', data: names,
      axisLabel: { color: '#94a3b8', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } },
    },
    series: [
      {
        name: '开发环境', type: 'bar', stack: 'total', data: devData,
        itemStyle: { color: '#3b82f6' },
        emphasis: { itemStyle: { color: '#60a5fa' } },
        barMaxWidth: 20,
        label: { show: false },
      },
      {
        name: '训练作业', type: 'bar', stack: 'total', data: trainData,
        itemStyle: { color: '#10b981' },
        emphasis: { itemStyle: { color: '#34d399' } },
        barMaxWidth: 20,
      },
      {
        name: '推理服务', type: 'bar', stack: 'total', data: inferData,
        itemStyle: { color: '#f59e0b', borderRadius: [0, 4, 4, 0] },
        emphasis: { itemStyle: { color: '#fbbf24' } },
        barMaxWidth: 20,
      },
    ],
  });
  setTimeout(() => c.resize(), 0);
  window.addEventListener('resize', () => c.resize());
}

/* ── detail rendering ── */
function buildLeaderMap(data) {
  const map = {};
  ['devenv','train','inference'].forEach(type => {
    const ud = (data[type]||{}).user_data || {};
    Object.entries(ud).forEach(([leader, ld]) => {
      if (!map[leader]) map[leader] = { gpu_num:0, task_count:0, max_duration:0, member_count:0, types:{} };
      map[leader].gpu_num     += ld.gpu_num;
      map[leader].task_count  += ld.task_count;
      map[leader].max_duration = Math.max(map[leader].max_duration, ld.max_duration);
      map[leader].types[type]  = ld;
      const mc = Object.keys(ld.members).length;
      if (mc > map[leader].member_count) map[leader].member_count = mc;
    });
  });
  return Object.entries(map).sort((a,b) => b[1].gpu_num - a[1].gpu_num);
}

function memberCard(member, md, type, li, mi, typeIdx) {
  const color = PAL[typeIdx % PAL.length];
  const typeColors = { devenv: '#3b82f6', train: '#10b981', inference: '#f59e0b' };
  const tc = typeColors[type];
  const tasks = md.tasks.map(t => `
    <div class="tr">
      <span class="tr-dot" style="background:${tc}"></span>
      <span class="tr-name" title="${t.task_name}">${t.task_name}</span>
      <span class="tr-npu" style="color:${tc}">${t.gpu_num} NPU</span>
      <span class="tr-dur">${t.duration}h</span>
      <span class="tr-spec" title="${t.spec_name}">${t.spec_name}</span>
    </div>`).join('');
  return `
  <div class="mb" id="mb-${type}-${li}-${mi}">
    <div class="mb-row" onclick="toggleMb('mb-${type}-${li}-${mi}')">
      <span class="chev">▶</span>
      <div class="mavatar" style="background:${tc}22;color:${tc}">${(member[0]||'?')}</div>
      <span class="mname" title="${member}">${member}</span>
      <div class="mstats">
        <div class="mstat"><div class="mstat-lbl">NPU</div><div class="mstat-val" style="color:${tc}">${md.gpu_num}</div></div>
        <div class="mstat"><div class="mstat-lbl">任务</div><div class="mstat-val task-val">${md.task_count}</div></div>
        <div class="mstat"><div class="mstat-lbl">最长</div><div class="mstat-val dur-val">${md.max_duration}h</div></div>
      </div>
    </div>
    <div class="task-list">${tasks || '<div class="empty-tip">无任务</div>'}</div>
  </div>`;
}

function typeSection(ld, type, li, typeIdx) {
  if (!ld) return '';
  const labels = { devenv:'开发环境', train:'训练作业', inference:'推理服务' };
  const pillCls = { devenv:'pill-dev', train:'pill-train', inference:'pill-infer' };
  const icons   = { devenv:'💻', train:'🚀', inference:'⚡' };
  const sorted  = Object.entries(ld.members).sort((a,b)=>b[1].gpu_num-a[1].gpu_num);
  const cards   = sorted.map(([m,md],mi) => memberCard(m,md,type,li,`${typeIdx}${mi}`,typeIdx)).join('');
  return `
  <div class="type-sec">
    <div class="type-pill ${pillCls[type]}">${icons[type]} ${labels[type]}</div>
    ${cards}
  </div>`;
}

function renderDetail(leaderMap) {
  const list = document.getElementById('detail-list');
  if (!leaderMap.length) { list.innerHTML = '<div class="empty-tip">暂无数据</div>'; return; }
  list.innerHTML = leaderMap.map(([leader, ld], li) => {
    const color = PAL[li % PAL.length];
    const typeSecs = ['devenv','train','inference']
      .map((t,ti) => typeSection(ld.types[t], t, li, ti)).join('');
    return `
    <div class="lb" id="lb-${li}" style="--lc:${color}">
      <div class="lb-row" onclick="toggleLb('lb-${li}')">
        <span class="chev">▶</span>
        <div class="lavatar">${(leader[0]||'?')}</div>
        <div class="linfo">
          <div class="lname" title="${leader}">${leader}</div>
          <div class="lmeta">${ld.member_count} 位组员</div>
        </div>
        <div class="lstats">
          <div class="lstat"><div class="lstat-lbl">总 NPU</div><div class="lstat-val npu-val">${ld.gpu_num}</div></div>
          <div class="lstat"><div class="lstat-lbl">总任务</div><div class="lstat-val task-val">${ld.task_count}</div></div>
          <div class="lstat"><div class="lstat-lbl">最长任务</div><div class="lstat-val dur-val">${ld.max_duration}h</div></div>
        </div>
        <div class="leader-badge">★ Leader</div>
      </div>
      <div class="lb-body">${typeSecs}</div>
    </div>`;
  }).join('');
}

function toggleLb(id) { document.getElementById(id).classList.toggle('open'); }
function toggleMb(id) { document.getElementById(id).classList.toggle('open'); }

/* ── main loader ── */
function loadData(force) {
  document.getElementById('loading').style.display = 'flex';
  fetch('/data' + (force ? '?force=1' : ''))
    .then(r => r.json())
    .then(data => {
      document.getElementById('upd-time').textContent = data.update_time;

      const totals = { devenv:0, train:0, inference:0 };
      const counts = { devenv:0, train:0, inference:0 };
      const labels = { devenv:'实例', train:'任务', inference:'服务' };

      ['devenv','train','inference'].forEach(t => {
        const ud = (data[t]||{}).user_data || {};
        Object.values(ud).forEach(ld => {
          totals[t] += ld.gpu_num;
          counts[t] += ld.task_count;
        });
      });

      const grand = totals.devenv + totals.train + totals.inference;
      document.getElementById('s-total').textContent   = grand;
      document.getElementById('s-devenv').textContent  = totals.devenv;
      document.getElementById('s-train').textContent   = totals.train;
      document.getElementById('s-inference').textContent = totals.inference;

      const pct = v => grand > 0 ? Math.round(v/grand*100) : 0;
      document.getElementById('p-devenv').style.width   = pct(totals.devenv)   + '%';
      document.getElementById('p-train').style.width    = pct(totals.train)    + '%';
      document.getElementById('p-inference').style.width = pct(totals.inference) + '%';

      document.getElementById('sub-devenv').textContent   = `${counts.devenv} 个${labels.devenv}`;
      document.getElementById('sub-train').textContent    = `${counts.train} 个${labels.train}`;
      document.getElementById('sub-inference').textContent = `${counts.inference} 个${labels.inference}`;

      // quota list + team chart (both use leaderMap)
      const leaderMap = buildLeaderMap(data);
      renderQuotaList(leaderMap, data.quotas || {});

      // team stacked chart (reuse leaderMap)
      initTeamChart(leaderMap);

      // detail
      renderDetail(leaderMap);
    })
    .catch(e => { console.error(e); alert('数据加载失败'); })
    .finally(() => { document.getElementById('loading').style.display = 'none'; });
}

loadData(false);
setInterval(() => loadData(false), 300_000);
</script>
