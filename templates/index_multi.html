<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPU 资源监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root {
  --bg:        #080c14;
  --bg2:       #0d1220;
  --bg3:       #121828;
  --bg-card:   rgba(255,255,255,.035);
  --border:    rgba(255,255,255,.07);
  --border-hi: rgba(255,255,255,.14);
  --blue:   #3b82f6;
  --cyan:   #06b6d4;
  --green:  #10b981;
  --orange: #f59e0b;
  --red:    #ef4444;
  --purple: #8b5cf6;
  --pink:   #ec4899;
  --text:   #e2e8f0;
  --text2:  #64748b;
  --text3:  #94a3b8;
  --r:      14px;
  --r-sm:   8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;min-height:100vh}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(13,18,32,.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
}
header h1{font-size:19px;font-weight:700;letter-spacing:.5px}
header h1 span{
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-right{display:flex;align-items:center;gap:16px}
.update-info{font-size:13px;color:var(--text2)}
.update-info b{color:var(--green);font-weight:500}
.refresh-btn{
  cursor:pointer;padding:7px 18px;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border:none;font-size:13px;font-weight:500;
  transition:opacity .2s;letter-spacing:.3px;
}
.refresh-btn:hover{opacity:.85}

/* ── Top grid ── */
.top-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:16px;padding:20px 28px 0;align-items:stretch;
}

/* ── Summary cards ── */
.cards-col{display:flex;flex-direction:column;gap:12px}
.cards-col .s-card{flex:1}
.s-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 22px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;transition:border-color .2s;
}
.s-card:hover{border-color:var(--border-hi)}
.s-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.s-card.c-blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.s-card.c-green::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.s-card.c-orange::before{background:linear-gradient(90deg,var(--orange),var(--pink))}
.s-card.c-red::before{background:linear-gradient(90deg,var(--red),var(--purple))}
.s-card .lbl{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
.s-card .val{font-size:38px;font-weight:800;line-height:1;letter-spacing:-1px}
.s-card.c-blue   .val{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-card.c-green  .val{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-card.c-orange .val{background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-card.c-red    .val{background:linear-gradient(135deg,var(--red),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-card .sub{font-size:13px;color:var(--text2);margin-top:6px}

/* ── Chart boxes ── */
.chart-box{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 20px 16px;
  display:flex;flex-direction:column;
}
.chart-title{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--text3);
  margin-bottom:12px;flex-shrink:0;
}
.chart-title .icon{font-size:15px}
.chart-box .echart{flex:1;min-height:260px;width:100%}

/* ── Panel section ── */
.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:16px 28px 28px}
.panel{border-radius:var(--r);overflow:hidden;background:var(--bg-card);border:1px solid var(--border)}
.panel-hdr{
  display:flex;align-items:center;gap:10px;
  padding:16px 20px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02);
}
.panel-hdr:hover{background:rgba(255,255,255,.04)}
.panel-icon{font-size:16px}
.panel-hdr h2{font-size:15px;font-weight:700;flex:1}
.panel-badge{
  font-size:12px;padding:3px 12px;border-radius:20px;
  font-weight:500;letter-spacing:.2px;
}
.badge-blue  {background:rgba(59,130,246,.15);color:var(--blue)}
.badge-green {background:rgba(16,185,129,.15);color:var(--green)}
.badge-orange{background:rgba(245,158,11,.15);color:var(--orange)}

/* ── Leader card rows ── */
.leader-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.leader-card{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;transition:border-color .2s;
}
.leader-card:hover{border-color:var(--border-hi)}
.leader-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;cursor:pointer;
}
.expand-btn{
  color:var(--text2);font-size:11px;transition:transform .25s;flex-shrink:0;
}
.leader-card.open .expand-btn{transform:rotate(90deg)}
.avatar{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.leader-info{flex:1;min-width:0}
.leader-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leader-meta{font-size:12px;color:var(--text2);margin-top:2px}
.leader-stats{display:flex;gap:20px;flex-shrink:0}
.stat-item{text-align:center}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:2px;white-space:nowrap}
.stat-val{font-size:15px;font-weight:700}
.stat-npu {color:var(--blue)}
.stat-task{color:var(--green)}
.stat-dur {color:var(--purple)}
.leader-badge{
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(245,158,11,.15);color:var(--orange);
  font-weight:600;flex-shrink:0;white-space:nowrap;
}

/* ── Member rows ── */
.member-list{display:none;padding:0 14px 10px;flex-direction:column;gap:6px}
.leader-card.open .member-list{display:flex}
.member-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;
}
.member-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;cursor:pointer;
}
.member-row .expand-btn{font-size:10px}
.member-card.open .member-row .expand-btn{transform:rotate(90deg)}
.m-avatar{
  width:28px;height:28px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;opacity:.8;
}
.member-name{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-stats{display:flex;gap:14px;flex-shrink:0}
.member-stats .stat-val{font-size:13px}

/* ── Task rows ── */
.task-list{display:none;padding:0 12px 8px;flex-direction:column;gap:4px}
.member-card.open .task-list{display:flex}
.task-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:6px;
  background:rgba(255,255,255,.015);font-size:12px;color:var(--text3);
}
.task-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-gpu{color:var(--blue);font-weight:600;flex-shrink:0}
.task-dur{color:var(--text2);flex-shrink:0;min-width:36px;text-align:right}
.task-spec{color:var(--text2);flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.empty-tip{padding:28px;text-align:center;color:var(--text2);font-size:14px}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;z-index:99;
  background:rgba(8,12,20,.75);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:var(--text3)}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>数据加载中…</p></div>

<header>
  <div class="header-left">
    <div class="header-logo">N</div>
    <h1>NPU <span>资源监控</span></h1>
  </div>
  <div class="header-right">
    <div class="update-info">更新于 <b id="update-time">—</b></div>
    <button class="refresh-btn" onclick="loadData(true)">↻ 刷新</button>
  </div>
</header>

<!-- Top: 3 equal columns -->
<div class="top-grid">

  <!-- Col 1: 4 summary cards -->
  <div class="cards-col">
    <div class="s-card c-blue">
      <div class="lbl">开发环境 NPU</div>
      <div class="val" id="sum-devenv">—</div>
      <div class="sub" id="sum-devenv-tasks">— 个实例</div>
    </div>
    <div class="s-card c-green">
      <div class="lbl">训练作业 NPU</div>
      <div class="val" id="sum-train">—</div>
      <div class="sub" id="sum-train-tasks">— 个任务</div>
    </div>
    <div class="s-card c-orange">
      <div class="lbl">推理服务 NPU</div>
      <div class="val" id="sum-inference">—</div>
      <div class="sub" id="sum-inference-tasks">— 个服务</div>
    </div>
    <div class="s-card c-red">
      <div class="lbl">NPU 合计</div>
      <div class="val" id="sum-total">—</div>
      <div class="sub">全部资源占用</div>
    </div>
  </div>

  <!-- Col 2: team totals bar chart -->
  <div class="chart-box">
    <div class="chart-title"><span class="icon">◈</span>各小组 NPU 占用（开发＋训练＋推理）</div>
    <div class="echart" id="chart-leader-all"></div>
  </div>

  <!-- Col 3: resource pool grouped bar -->
  <div class="chart-box">
    <div class="chart-title"><span class="icon">▦</span>各资源池 NPU 占用（开发 / 训练 / 推理）</div>
    <div class="echart" id="chart-spec-all"></div>
  </div>

</div>

<!-- Bottom: 3 detail panels -->
<div class="panels">

  <div class="panel" id="panel-devenv">
    <div class="panel-hdr" onclick="togglePanel('devenv')">
      <span class="panel-icon">💻</span>
      <h2>开发环境</h2>
      <span class="panel-badge badge-blue" id="badge-devenv">—</span>
    </div>
    <div id="body-devenv"><div id="list-devenv" class="leader-list"></div></div>
  </div>

  <div class="panel" id="panel-train">
    <div class="panel-hdr" onclick="togglePanel('train')">
      <span class="panel-icon">🚀</span>
      <h2>训练作业</h2>
      <span class="panel-badge badge-green" id="badge-train">—</span>
    </div>
    <div id="body-train"><div id="list-train" class="leader-list"></div></div>
  </div>

  <div class="panel" id="panel-inference">
    <div class="panel-hdr" onclick="togglePanel('inference')">
      <span class="panel-icon">⚡</span>
      <h2>推理服务</h2>
      <span class="panel-badge badge-orange" id="badge-inference">—</span>
    </div>
    <div id="body-inference"><div id="list-inference" class="leader-list"></div></div>
  </div>

</div>

<script>
// ── Palette ───────────────────────────────────────────────
const AVATAR_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#a78bfa'];
const CHART_COLORS  = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#a78bfa'];

function avatarColor(i){ return AVATAR_COLORS[i % AVATAR_COLORS.length] }
function initials(name){ return name ? name[0] : '?' }

// ── Charts ────────────────────────────────────────────────
let _charts = {};

function makeBarChart(elId, names, values) {
  if (_charts[elId]) _charts[elId].dispose();
  const c = echarts.init(document.getElementById(elId));
  _charts[elId] = c;
  c.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      backgroundColor: '#1a2035', borderColor: 'rgba(255,255,255,.1)',
      textStyle: { color: '#e2e8f0', fontSize: 13 },
    },
    grid: { left: 8, right: 16, top: 6, bottom: 4, containLabel: true },
    xAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: 'rgba(255,255,255,.06)' } },
      axisLabel: { color: '#64748b', fontSize: 12 },
    },
    yAxis: {
      type: 'category', data: names,
      axisLabel: { color: '#94a3b8', fontSize: 12 },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,.06)' } },
    },
    series: [{
      type: 'bar', data: values, barMaxWidth: 18,
      itemStyle: {
        color: new echarts.graphic.LinearGradient(1,0,0,0,[
          { offset: 0, color: '#3b82f6' },
          { offset: 1, color: '#06b6d4' },
        ]),
        borderRadius: [0, 4, 4, 0],
      },
    }],
  });
  setTimeout(() => c.resize(), 0);
  window.addEventListener('resize', () => c.resize());
}

function makeGroupedBarChart(elId, specs, seriesArr) {
  if (_charts[elId]) _charts[elId].dispose();
  const c = echarts.init(document.getElementById(elId));
  _charts[elId] = c;
  c.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      backgroundColor: '#1a2035', borderColor: 'rgba(255,255,255,.1)',
      textStyle: { color: '#e2e8f0', fontSize: 13 },
    },
    legend: {
      top: 0, right: 0, itemWidth: 10, itemHeight: 10,
      textStyle: { color: '#94a3b8', fontSize: 12 },
    },
    grid: { left: 8, right: 16, top: 28, bottom: 4, containLabel: true },
    xAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: 'rgba(255,255,255,.06)' } },
      axisLabel: { color: '#64748b', fontSize: 12 },
    },
    yAxis: {
      type: 'category', data: specs,
      axisLabel: { color: '#94a3b8', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,.06)' } },
    },
    series: seriesArr.map(s => ({
      name: s.name, type: 'bar', data: s.data, barMaxWidth: 12,
      itemStyle: { color: s.color, borderRadius: [0,3,3,0] },
    })),
  });
  setTimeout(() => c.resize(), 0);
  window.addEventListener('resize', () => c.resize());
}

// ── Leader card renderer ──────────────────────────────────
function renderPanel(type, userData) {
  const list = document.getElementById(`list-${type}`);
  if (!userData || Object.keys(userData).length === 0) {
    list.innerHTML = `<div class="empty-tip">暂无数据</div>`;
    return { totalGpu: 0, totalTasks: 0 };
  }

  let totalGpu = 0, totalTasks = 0;
  const sorted = Object.entries(userData).sort((a, b) => b[1].gpu_num - a[1].gpu_num);

  list.innerHTML = sorted.map(([leader, ld], li) => {
    totalGpu   += ld.gpu_num;
    totalTasks += ld.task_count;
    const memberCount = Object.keys(ld.members).length;
    const memSorted = Object.entries(ld.members).sort((a,b) => b[1].gpu_num - a[1].gpu_num);
    const color = avatarColor(li);

    const memberCards = memSorted.map(([member, md], mi) => {
      const taskRows = md.tasks.map(t => `
        <div class="task-row">
          <span class="task-name" title="${t.task_name}">${t.task_name}</span>
          <span class="task-gpu">${t.gpu_num} NPU</span>
          <span class="task-dur">${t.duration}h</span>
          <span class="task-spec" title="${t.spec_name}">${t.spec_name}</span>
        </div>`).join('');

      return `
      <div class="member-card" id="mc-${type}-${li}-${mi}">
        <div class="member-row" onclick="toggleMemberCard('mc-${type}-${li}-${mi}')">
          <span class="expand-btn">▶</span>
          <div class="m-avatar" style="background:${color}22;color:${color}">${initials(member)}</div>
          <span class="member-name" title="${member}">${member}</span>
          <div class="member-stats">
            <div class="stat-item"><div class="stat-lbl">NPU</div><div class="stat-val stat-npu">${md.gpu_num}</div></div>
            <div class="stat-item"><div class="stat-lbl">任务</div><div class="stat-val stat-task">${md.task_count}</div></div>
            <div class="stat-item"><div class="stat-lbl">最长</div><div class="stat-val stat-dur">${md.max_duration}h</div></div>
          </div>
        </div>
        <div class="task-list">${taskRows}</div>
      </div>`;
    }).join('');

    return `
    <div class="leader-card" id="lc-${type}-${li}">
      <div class="leader-row" onclick="toggleLeaderCard('lc-${type}-${li}')">
        <span class="expand-btn">▶</span>
        <div class="avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initials(leader)}</div>
        <div class="leader-info">
          <div class="leader-name" title="${leader}">${leader}</div>
          <div class="leader-meta">${memberCount} 位组员</div>
        </div>
        <div class="leader-stats">
          <div class="stat-item"><div class="stat-lbl">总 NPU</div><div class="stat-val stat-npu">${ld.gpu_num}</div></div>
          <div class="stat-item"><div class="stat-lbl">总任务</div><div class="stat-val stat-task">${ld.task_count}</div></div>
          <div class="stat-item"><div class="stat-lbl">最长任务</div><div class="stat-val stat-dur">${ld.max_duration}h</div></div>
        </div>
        <div class="leader-badge">★ Leader</div>
      </div>
      <div class="member-list">${memberCards}</div>
    </div>`;
  }).join('');

  return { totalGpu, totalTasks };
}

function toggleLeaderCard(id) {
  document.getElementById(id).classList.toggle('open');
}
function toggleMemberCard(id) {
  document.getElementById(id).classList.toggle('open');
}
function togglePanel(type) {
  const body = document.getElementById(`body-${type}`);
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

// ── Main loader ───────────────────────────────────────────
function loadData(force) {
  document.getElementById('loading').style.display = 'flex';

  fetch('/data' + (force ? '?force=1' : ''))
    .then(r => r.json())
    .then(data => {
      document.getElementById('update-time').textContent = data.update_time;

      let grandTotal = 0;
      const labels = { devenv: '实例', train: '任务', inference: '服务' };

      ['devenv', 'train', 'inference'].forEach(type => {
        const { totalGpu, totalTasks } = renderPanel(type, (data[type] || {}).user_data || {});
        grandTotal += totalGpu;
        document.getElementById(`sum-${type}`).textContent       = totalGpu;
        document.getElementById(`sum-${type}-tasks`).textContent = `${totalTasks} 个${labels[type]}`;
        document.getElementById(`badge-${type}`).textContent     = `${totalGpu} NPU · ${totalTasks} 个`;
      });
      document.getElementById('sum-total').textContent = grandTotal;

      // Team totals bar chart
      const leaderTotals = {};
      ['devenv','train','inference'].forEach(type => {
        Object.entries((data[type]||{}).user_data||{}).forEach(([l,ld]) => {
          leaderTotals[l] = (leaderTotals[l]||0) + ld.gpu_num;
        });
      });
      const le = Object.entries(leaderTotals).sort((a,b)=>b[1]-a[1]).slice(0,15);
      makeBarChart('chart-leader-all', le.map(e=>e[0]), le.map(e=>e[1]));

      // Resource pool grouped bar chart
      const specMap = {devenv:{},train:{},inference:{}};
      const allSpecs = new Set();
      ['devenv','train','inference'].forEach(type => {
        Object.entries((data[type]||{}).spec_data||{}).forEach(([s,v]) => {
          specMap[type][s] = v; allSpecs.add(s);
        });
      });
      const sortedSpecs = [...allSpecs]
        .map(s => [s,(specMap.devenv[s]||0)+(specMap.train[s]||0)+(specMap.inference[s]||0)])
        .sort((a,b)=>b[1]-a[1]).slice(0,12).map(e=>e[0]);
      makeGroupedBarChart('chart-spec-all', sortedSpecs, [
        { name:'开发环境', color:'#3b82f6', data: sortedSpecs.map(s=>specMap.devenv[s]||0) },
        { name:'训练作业', color:'#10b981', data: sortedSpecs.map(s=>specMap.train[s]||0) },
        { name:'推理服务', color:'#f59e0b', data: sortedSpecs.map(s=>specMap.inference[s]||0) },
      ]);
    })
    .catch(err => { console.error(err); alert('数据加载失败，请检查后端服务'); })
    .finally(() => { document.getElementById('loading').style.display = 'none'; });
}

loadData(false);
setInterval(() => loadData(false), 300_000);
</script>
</body>
